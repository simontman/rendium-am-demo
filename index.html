<style>
:root {
  /* Rendium brand — navy spectrum */
  --navy-deep:     #0C1A2E;
  --navy-mid:      #13294B;
  --navy-dark-bg:  #06090F;

  /* Rendium brand — accents */
  --rendium-blue:  #2E6FE6;
  --bright-blue:   #4F7FFF;
  --electric:      #6B9EB8;
  --gold:          #C9A961;
  --gold-bright:   #E0C584;

  /* Light cockpit surfaces (kept warm-neutral to match paper feel) */
  --bg:            #F5F2EC;
  --bg-raised:     #FAF8F2;
  --bg-sunken:     #EBE7DB;
  --panel:         #FFFFFF;
  --panel-2:       #F8F5EE;

  /* Borders + structure */
  --border:        #DDD6C6;
  --border-soft:   #E7E0D0;
  --border-strong: #B9B0A0;

  /* Ink */
  --ink:           #0C1A2E;
  --ink-2:         #3C4A5F;
  --ink-3:         #6A7386;
  --ink-4:         #9BA0AA;

  /* Aliases — accent points to Rendium-Blue now (was brass gold) */
  --accent:        #2E6FE6;
  --accent-hi:     #4F7FFF;
  --accent-2:      #0C1A2E;

  /* Semantic */
  --positive:      #2F7A4A;
  --positive-bg:   #E3F0E6;
  --negative:      #A84434;
  --negative-bg:   #F5E4DE;
  --amber:         #A8741A;
  --amber-bg:      #F5E8D0;
  --info-bg:       #DCE6F8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
  font-size: 13px; line-height: 1.45;
}
.font-mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.font-disp  { font-family: 'Playfair Display', Georgia, serif; }
.num        { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.caps       { text-transform: uppercase; letter-spacing: 0.18em; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; color: var(--ink-3); }
.caps-sm    { font-size: 9.5px; letter-spacing: 0.2em; }
.h1         { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 30px; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); }
.h2         { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 22px; line-height: 1.15; letter-spacing: -0.015em; color: var(--ink); }
.h3         { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 17px; line-height: 1.25; color: var(--ink); }
.kpi        { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 26px; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); }
.kpi-sm     { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 20px; color: var(--ink); }
.serif      { font-family: 'Playfair Display', serif; font-weight: 500; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

.panel        { background: var(--panel);   border: 1px solid var(--border); border-radius: 3px; }
.panel-cream  { background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--border-strong);
  background: var(--panel); color: var(--ink);
  padding: 6px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 500;
  border-radius: 2px; cursor: pointer;
  transition: all 120ms ease; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); background: #FFFCF5; }
.btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #FFFCF5; }
.btn-sm { padding: 4px 8px; font-size: 9.5px; }

.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.08em;
  text-transform: uppercase; font-weight: 500;
  border: 1px solid var(--border-strong);
  border-radius: 2px; color: var(--ink-2);
  background: var(--panel); white-space: nowrap;
}
.chip-pos { color: var(--positive); border-color: #B0CCB5; background: var(--positive-bg); }
.chip-neg { color: var(--negative); border-color: #D4B0A5; background: var(--negative-bg); }
.chip-amb { color: var(--amber);    border-color: #D4B98A; background: var(--amber-bg); }
.chip-acc { color: var(--rendium-blue);  border-color: #A8C2EC; background: #E4ECF9; }
.chip-inf { color: var(--navy-deep);     border-color: #A8B8CC; background: var(--info-bg); }

.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot-pos { background: var(--positive); }
.dot-neg { background: var(--negative); }
.dot-amb { background: var(--amber); }
.dot-pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--positive); display: inline-block;
  box-shadow: 0 0 0 0 rgba(47,122,74, 0.5);
  animation: pulse 2.2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(47,122,74, 0.5); }
  50%      { box-shadow: 0 0 0 7px rgba(47,122,74, 0); }
}

.hl-b      { border-bottom: 1px solid var(--border); }
.hl-t      { border-top: 1px solid var(--border); }
.hl-r      { border-right: 1px solid var(--border); }
.hl-l      { border-left: 1px solid var(--border); }
.hl-b-soft { border-bottom: 1px solid var(--border-soft); }

.tbl { width: 100%; }
.tbl-row {
  display: grid; align-items: center;
  border-bottom: 1px solid var(--border-soft);
  font-size: 12.5px;
}
.tbl-row:last-child { border-bottom: none; }
.tbl-row > * { padding: 9px 11px; }
.tbl-head {
  display: grid; align-items: center;
  background: var(--panel-2);
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 500;
}
.tbl-head > * { padding: 7px 11px; }
.row-hover { cursor: pointer; transition: background-color 80ms; }
.row-hover:hover { background: var(--panel-2); }
.row-active { background: #E9F0FC; box-shadow: inset 3px 0 0 0 var(--rendium-blue); }
.row-active:hover { background: #DCE6F8; }

/* KEIN HOLD/SELL col mehr in portfolio/modern */
.grid-props     { grid-template-columns: 70px 1.5fr 110px 55px 120px 80px 70px 80px; }
.grid-units     { grid-template-columns: 52px 44px 1fr 72px 68px; }
.grid-units-full{ grid-template-columns: 52px 44px 70px 70px 1fr 95px 75px 70px; }
.grid-history   { grid-template-columns: 90px 150px 90px 76px 60px 1fr 50px; }
.grid-modern    { grid-template-columns: 100px 100px 1fr 110px 110px 90px 90px 90px 70px; }
.grid-comms     { grid-template-columns: 95px 120px 70px 1fr 80px 90px; }
.grid-compare   { grid-template-columns: 1.3fr 72px 80px 72px 72px; }
.grid-expiry    { grid-template-columns: 52px 120px 1fr 100px 70px 110px 90px; }
.grid-vacancy   { grid-template-columns: 70px 52px 70px 1fr 90px 120px 100px; }
.grid-collect   { grid-template-columns: 70px 52px 120px 1fr 90px 100px 90px 90px; }
.grid-actions   { grid-template-columns: 90px 52px 100px 1fr 100px 90px; }

input, select, textarea {
  background: var(--bg-raised); border: 1px solid var(--border); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  padding: 6px 9px; border-radius: 2px; outline: none; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { font-family: 'Inter Tight', sans-serif; line-height: 1.5; }

.tab {
  padding: 0 14px; height: 54px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-3);
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  position: relative; font-weight: 500;
}
.tab:hover { color: var(--ink); }
.tab-active { color: var(--ink); }
.tab-active::after {
  content: ''; position: absolute;
  left: 14px; right: 14px; bottom: 0;
  height: 2px; background: var(--accent);
}

.modal-bg {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(26,28,31,0.55); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal {
  background: var(--bg); border: 1px solid var(--border-strong);
  border-radius: 3px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  max-height: 90vh; display: flex; flex-direction: column;
  overflow: hidden;
}

.highlight {
  background: linear-gradient(135deg, #EEF3FC 0%, #DCE6F8 100%);
  border: 1px solid #A8C2EC; border-radius: 3px;
}

.energy-badge {
  display: inline-block;
  width: 22px; height: 18px;
  text-align: center; line-height: 18px;
  color: #fff; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  border-radius: 2px;
}
.energy-A { background: #2F7A4A; } .energy-B { background: #5AA36C; } .energy-C { background: #8FB84D; }
.energy-D { background: #D4B84F; } .energy-E { background: #D49E4F; } .energy-F { background: #C67840; }
.energy-G { background: #A84434; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 260ms ease both; }

.flex { display: flex; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; }
.flex-1 { flex: 1 1 auto; } .flex-col { flex-direction: column; }

.grid { display: grid; }
.gc-2 { grid-template-columns: repeat(2, 1fr); }
.gc-3 { grid-template-columns: repeat(3, 1fr); }
.gc-4 { grid-template-columns: repeat(4, 1fr); }
.gc-5 { grid-template-columns: repeat(5, 1fr); }
.gc-6 { grid-template-columns: repeat(6, 1fr); }

.p-2 { padding: 8px; } .p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
.px-3 { padding-left: 12px; padding-right: 12px; } .px-4 { padding-left: 16px; padding-right: 16px; } .px-5 { padding-left: 20px; padding-right: 20px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; } .py-3 { padding-top: 12px; padding-bottom: 12px; } .py-4 { padding-top: 16px; padding-bottom: 16px; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; } .mb-5 { margin-bottom: 20px; }
.ml-2 { margin-left: 8px; } .ml-auto { margin-left: auto; }
.pt-3 { padding-top: 12px; } .pt-4 { padding-top: 16px; }

.text-right { text-align: right; }
.text-center { text-align: center; }
.text-xs { font-size: 10.5px; }
.text-sm { font-size: 11.5px; }
.text-base { font-size: 13px; }
.text-lg { font-size: 15px; }
.leading-snug { line-height: 1.35; }
.leading-relaxed { line-height: 1.6; }

.text-ink { color: var(--ink); }
.text-ink-2 { color: var(--ink-2); }
.text-ink-3 { color: var(--ink-3); }
.text-ink-4 { color: var(--ink-4); }
.text-acc   { color: var(--accent); }
.text-acc2  { color: var(--accent-2); }
.text-pos   { color: var(--positive); }
.text-neg   { color: var(--negative); }
.text-amb   { color: var(--amber); }

.bg-panel  { background: var(--panel); }
.bg-cream  { background: var(--panel-2); }
.bg-sunken { background: var(--bg-sunken); }

.w-full { width: 100%; }
.h-full { height: 100%; }
.relative { position: relative; }
.absolute { position: absolute; }
.sticky { position: sticky; top: 0; }
.z-10 { z-index: 10; } .z-20 { z-index: 20; } .z-30 { z-index: 30; }
.overflow-hidden { overflow: hidden; }
.overflow-y-auto { overflow-y: auto; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.uppercase { text-transform: uppercase; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.rounded-sm { border-radius: 2px; }
.rounded    { border-radius: 3px; }
.rounded-full { border-radius: 999px; }
.cursor-pointer { cursor: pointer; }

.bar { position: relative; display: block; height: 4px; background: var(--bg-sunken); border-radius: 1px; overflow: hidden; width: 100%; }
.bar > .bar-fill { position: absolute; inset-block: 0; left: 0; background: var(--accent); }

.pbar { position: relative; background: var(--bg-sunken); height: 8px; border-radius: 1px; overflow: hidden; }
.pbar-fill { position: absolute; inset-block: 0; left: 0; background: var(--accent); }
.pbar-fill-pos { background: var(--positive); }

/* bar for TabCapex (inline progress) */
.bar-fill-wrap { position: relative; background: var(--bg-sunken); height: 5px; border-radius: 1px; overflow: hidden; width: 100%; }
.bar-fill { position: absolute; inset-block: 0; left: 0; background: var(--accent); }

/* btn variants */
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--border); background: transparent; color: var(--ink-2);
  padding: 5px 10px; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;
  border-radius: 2px; cursor: pointer; transition: all 120ms ease; white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: #FFFCF5; }

/* chip active state */
.chip { cursor: pointer; transition: all 120ms ease; }
.chip:hover { border-color: var(--rendium-blue); color: var(--rendium-blue); }
.chip-on { background: var(--navy-deep); color: #F8F6F2; border-color: var(--navy-deep); }
.chip-on:hover { background: var(--rendium-blue); border-color: var(--rendium-blue); color: #F8F6F2; }

/* modal aliases */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(26,28,31,0.55); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal { width: 560px; max-width: 100%; }
.modal-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel-2);
}

/* input alias */
.inp {
  background: var(--bg-raised); border: 1px solid var(--border); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  padding: 7px 10px; border-radius: 2px; outline: none; width: 100%;
}
.inp:focus { border-color: var(--accent); }
textarea.inp { font-family: 'Inter Tight', sans-serif; line-height: 1.5; resize: vertical; }

/* grid-mod (shorter alias) */
.grid-mod { grid-template-columns: 70px 60px 1fr 90px 110px 110px 90px 110px 90px; }

/* comm-row */
.comm-row {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer; transition: background-color 80ms;
}
.comm-row:last-child { border-bottom: none; }
.comm-row:hover { background: var(--panel-2); }
.comm-row.row-active { background: #F7EFD7; box-shadow: inset 3px 0 0 0 var(--accent); }

/* footer */
.footer {
  padding: 12px 24px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; align-items: center;
  background: var(--panel-2);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-3); letter-spacing: 0.08em;
}

/* flex-wrap utility */
.flex-wrap { flex-wrap: wrap; }

/* grid-cols helpers */
.grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid-cols-4 { grid-template-columns: repeat(4, 1fr); }

.block { display: block; }

/* =====================================================================
   RENDIUM NAVY HEADER — Corporate brand frame
===================================================================== */
.rendium-header {
  position: sticky; top: 0; z-index: 30;
  background: linear-gradient(180deg, #0C1A2E 0%, #0A1628 100%);
  border-bottom: 1px solid rgba(79,127,255,0.12);
  box-shadow: 0 1px 0 0 rgba(0,0,0,0.04), 0 4px 24px -6px rgba(12,26,46,0.18);
}
.rendium-logo {
  display: flex; flex-direction: column; line-height: 1;
  padding-right: 20px;
  border-right: 1px solid rgba(248,246,242,0.1);
  margin-right: 4px;
}
.rendium-logo-wordmark {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: #F8F6F2;
  line-height: 1;
}
.rendium-logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.24em;
  color: rgba(248,246,242,0.48);
  margin-top: 4px;
  font-weight: 400;
}
.rendium-crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: rgba(248,246,242,0.55);
  text-transform: uppercase;
}
.rendium-crumb-active { color: #F8F6F2; font-weight: 500; }
.rendium-crumb-sep    { color: rgba(248,246,242,0.22); }

.rendium-tab {
  padding: 0 14px; height: 60px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(248,246,242,0.6);
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center;
  position: relative; font-weight: 500;
  transition: color 160ms ease;
}
.rendium-tab:hover { color: #F8F6F2; }
.rendium-tab-active { color: #F8F6F2; }
.rendium-tab-active::after {
  content: ''; position: absolute;
  left: 14px; right: 14px; bottom: 0;
  height: 2px;
  background: linear-gradient(90deg, #4F7FFF 0%, #2E6FE6 100%);
  border-radius: 2px 2px 0 0;
}

.rendium-demo-chip {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.16em;
  color: var(--gold-bright);
  border: 1px solid rgba(201,169,97,0.3);
  background: rgba(201,169,97,0.08);
  border-radius: 2px;
  font-weight: 500;
  text-transform: uppercase;
}

.rendium-avatar {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 4px;
  background: linear-gradient(135deg, #4F7FFF 0%, #2E6FE6 100%);
  color: #F8F6F2;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
  box-shadow: 0 2px 6px rgba(46,111,230,0.3);
}

.dot-pulse-light {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ADE80; display: inline-block;
  box-shadow: 0 0 0 0 rgba(74,222,128,0.5);
  animation: pulseLight 2.2s infinite;
}
@keyframes pulseLight {
  0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
  50%      { box-shadow: 0 0 0 7px rgba(74,222,128,0); }
}

/* Upgraded footer with Navy accent line */
.footer {
  padding: 14px 28px;
  border-top: 1px solid var(--border);

  return (
    <div className="relative" style={{ width:'100%', aspectRatio:'1000/700', background:'var(--bg-sunken)', border:'1px solid var(--border)', borderRadius: 3 }}>

          </pattern>
          <radialGradient id="pinGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stopColor="rgba(138,109,59,0.45)" />
            <stop offset="70%" stopColor="rgba(138,109,59,0.08)" />
            <stop offset="100%" stopColor="rgba(138,109,59,0)" />
          </radialGradient>
          <linearGradient id="berlinFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="#FAF5E8" />
            <stop offset="100%" stopColor="#F3ECD8" />

              fill="none" stroke="#5A7A95" strokeWidth="1" opacity="0.75" strokeLinecap="round" />
        {PROPERTIES.map(p => {
          const { x, y } = pinXY(p);
          const r = 6 + (p.gav / maxGav) * 5;
          const isHover = hover === p.code;
          return (
            <g key={p.code} transform={`translate(${x},${y})`}
               style={{ cursor:'pointer' }}
               onClick={() => onClick(p)}
               onMouseEnter={() => setHover(p.code)}

              <circle r={r+14} fill="url(#pinGlow)" />
              <circle r={r} fill={isHover ? '#B89056' : '#8A6D3B'} stroke="#FFF" strokeWidth="1.5" />
              <text y={-r-4} textAnchor="middle" fontFamily="JetBrains Mono" fontSize="9" fill="#1A1C1F" fontWeight="600" letterSpacing="0.5">
                {p.code}

        Berlin-Umriss · CC BY-SA Wikimedia · Pins schematisch

    </div>
  );
}

  const max = Math.max(...data.map(d => d.market));
  return (
    <div className="flex-col gap-2" style={{ display:'flex' }}>

function RentHistory({ unit }) {
  const all = [...RENT_HISTORY, RENT_PROJECTED];
  const rents = all.map(r => r.rent);
  const yMin = Math.floor(Math.min(...rents) / 50) * 50 - 50;
  const yMax = Math.ceil(Math.max(...rents) / 50) * 50 + 50;
  const W = 840, H = 220;
  const padL = 50, padR = 20, padT = 20, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const x = i => padL + (i / (all.length - 1)) * innerW;
  const y = v => padT + (1 - (v - yMin)/(yMax - yMin)) * innerH;
  const pathActual = RENT_HISTORY.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d.rent)}`).join(' ');
  const lastI = RENT_HISTORY.length - 1;
  const projPath = `M ${x(lastI)} ${y(RENT_HISTORY[lastI].rent)} L ${x(lastI+1)} ${y(RENT_PROJECTED.rent)}`;

  return (
    <div className="panel p-5">
      <div className="flex items-start justify-between mb-4">
        <div>
          <div className="caps mb-1">Mieten-Historie · {unit.n}</div>
          <div className="h3">Chronologische Anpassungen mit Rechtsgrundlage</div>
        </div>
        <div className="flex gap-2">
          <span className="chip chip-inf">{RENT_HISTORY.length} EVENTS</span>
          <span className="chip">SEIT 2019</span>
        </div>

function TabCapex({ selectedProp, setSelectedProp }) {
  const [scope, setScope] = useState('PORTFOLIO'); // PORTFOLIO | OBJEKT
  const [statusFilter, setStatusFilter] = useState('ALLE');

  const rows = scope === 'OBJEKT'
    ? MODERNIZATIONS.filter(m => m.obj === selectedProp.code)
    : MODERNIZATIONS;

  const filtered = statusFilter === 'ALLE' ? rows : rows.filter(r => r.status === statusFilter);

  const totalBudget    = rows.reduce((s, m) => s + m.budget, 0);
  const totalSpent     = rows.reduce((s, m) => s + m.spent,  0);
  const totalCommitted = rows.filter(m => m.status !== 'ABGESCHLOSSEN').reduce((s, m) => s + (m.budget - m.spent), 0);
  const countActive    = rows.filter(m => m.status === 'IN UMSETZUNG').length;
  const countDone      = rows.filter(m => m.status === 'ABGESCHLOSSEN').length;

  const byKat = {};
  rows.forEach(m => { byKat[m.kat] = (byKat[m.kat] || 0) + m.budget; });
  const katEntries = Object.entries(byKat).sort((a, b) => b[1] - a[1]);

  return (
    <div className="p-5">
      {/* Scope toggle */}
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <button onClick={() => setScope('PORTFOLIO')} className={`chip ${scope === 'PORTFOLIO' ? 'chip-on' : ''}`}>PORTFOLIO · 11 Objekte</button>
          <button onClick={() => setScope('OBJEKT')}    className={`chip ${scope === 'OBJEKT'    ? 'chip-on' : ''}`}>NUR {selectedProp.code}</button>
        </div>
        <div className="text-xs text-ink-3 font-mono">Modernisierungen · ImmoWertV · § 71 GEG · § 559 BGB</div>
      </div>

      {/* KPI strip */}
      <div className="panel mb-4">
        <div className="grid" style={{ gridTemplateColumns: 'repeat(5, 1fr)' }}>
          <Metric label="Budget gesamt"        value={fmtEUR0(totalBudget)}    sub={`${rows.length} Maßnahmen`} border />
          <Metric label="Ausgegeben"           value={fmtEUR0(totalSpent)}     sub={`${((totalSpent/totalBudget)*100).toFixed(0)}% des Budgets`} border />
          <Metric label="Verpflichtungen"      value={fmtEUR0(totalCommitted)} sub="noch offen" border />
          <Metric label="In Umsetzung"         value={countActive}             sub={`${countDone} abgeschlossen`} border />
          <Metric label="Ø Budget/Maßnahme"    value={fmtEUR0(totalBudget / Math.max(rows.length, 1))} sub="" />
        </div>
      </div>

      {/* Split: Kategorien (left) + Modernisierungstabelle (right) */}
      <div className="grid gap-4" style={{ gridTemplateColumns: '320px 1fr' }}>
        <div className="panel">

              const pct = (sum / totalBudget) * 100;
              return (
                <div key={kat}>
                  <div className="flex items-center justify-between mb-1">
                    <div className="font-mono text-xs">{kat}</div>
                    <div className="font-mono text-xs text-ink-2">{fmtEUR0(sum)}</div>
                  </div>
                  <div className="bar"><div className="bar-fill" style={{ width: pct + '%' }} /></div>
                </div>
              );
            })}
          </div>
          <div className="hl-t p-4">
            <div className="caps mb-2">GEG § 71 · Heizungsgesetz</div>
            <div className="text-xs text-ink-2" style={{ lineHeight: 1.6 }}>
              Neu eingebaute Heizungen in Bestandsgebäuden müssen ab <span className="font-mono">2026-06-30</span>{' '}
              zu 65% mit erneuerbaren Energien betrieben werden (Berlin &gt; 100.000 EW).
              Relevant für <span className="font-mono">OBJ-F, OBJ-G</span>.
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="px-4 py-3 hl-b flex items-center justify-between">
            <div className="caps">Maßnahmen · {filtered.length}</div>
            <div className="flex gap-1">
              {['ALLE','IN UMSETZUNG','AUSSCHREIBUNG','TERMINIERT','GENEHMIGUNG','PRÜFUNG','ABGESCHLOSSEN'].map(s => (
                <button key={s}
                        onClick={() => setStatusFilter(s)}
                        className={`chip ${statusFilter === s ? 'chip-on' : ''}`}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div className="tbl-head grid-mod">
            <div>ID</div>
            <div>Obj</div>
            <div>Maßnahme</div>
            <div>Kat</div>
            <div className="text-right">Budget</div>
            <div className="text-right">Ausgegeben</div>
            <div>Zeitraum</div>
            <div>Status</div>
            <div>Wirkung</div>
          </div>
          <div style={{ maxHeight: 640, overflowY: 'auto' }}>
            {filtered.map(m => {
              const prop = PROPERTIES.find(p => p.code === m.obj);
              const statusTone =
                m.status === 'ABGESCHLOSSEN' ? 'chip-pos' :
                m.status === 'IN UMSETZUNG'  ? 'chip-on'  :
                m.status === 'AUSSCHREIBUNG' ? 'chip-amb' :
                m.status === 'GENEHMIGUNG'   ? 'chip-amb' : '';
              return (
                <div key={m.id} className="tbl-row grid-mod row-hover">
                  <div className="font-mono text-xs">{m.id}</div>
                  <div className="font-mono text-xs">{m.obj}</div>
                  <div className="text-sm">
                    {m.title}
                    {prop && <div className="text-xs text-ink-3 font-mono">{prop.name}</div>}
                  </div>
                  <div><span className="chip">{m.kat}</span></div>
                  <div className="num font-mono text-right">{fmtEUR0(m.budget)}</div>
                  <div className="num font-mono text-right">
                    {fmtEUR0(m.spent)}
                    <div className="bar" style={{ marginTop: 4 }}>
                      <div className="bar-fill" style={{ width: Math.min(100, (m.spent/m.budget)*100) + '%' }} />
                    </div>
                  </div>
                  <div className="font-mono text-xs text-ink-2">{m.start.slice(0,7)}<br/>→ {m.end.slice(0,7)}</div>
                  <div><span className={`chip ${statusTone}`}>{m.status}</span></div>
                  <div className="font-mono text-xs">
                    {m.impact !== '-' && <div>Energie: <b>{m.impact}</b></div>}
                    {m.savingsKwh > 0 && <div className="text-ink-3">−{m.savingsKwh} kWh/m²</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

      <p style={legalP}>Sie haben uns gegenüber folgende Rechte hinsichtlich der Sie betreffenden personenbezogenen Daten:</p>
      <ul style={legalUl}>
        <li style={legalLi}><b style={{ color: 'var(--ink)' }}>Auskunft</b> (Art. 15 DSGVO)</li>
        <li style={legalLi}><b style={{ color: 'var(--ink)' }}>Berichtigung</b> (Art. 16 DSGVO)</li>
        <li style={legalLi}><b style={{ color: 'var(--ink)' }}>Löschung</b> (Art. 17 DSGVO)</li>
        <li style={legalLi}><b style={{ color: 'var(--ink)' }}>Einschränkung der Verarbeitung</b> (Art. 18 DSGVO)</li>
        <li style={legalLi}><b style={{ color: 'var(--ink)' }}>Datenübertragbarkeit</b> (Art. 20 DSGVO)</li>
        <li style={{ ...legalLi, borderBottom: 'none' }}><b style={{ color: 'var(--ink)' }}>Widerspruch</b> gegen die Verarbeitung (Art. 21 DSGVO)</li>
      </ul>
      <p style={legalP}>
        Zur Ausübung Ihrer Rechte genügt eine formlose Mitteilung an <a style={legalA} href="mailto:info@rendium.ai">info@rendium.ai</a>.
      </p>

      <h2 style={legalH2}>8. Beschwerderecht</h2>
      <p style={legalP}>
        Sie haben das Recht, sich bei einer Datenschutzaufsichtsbehörde über die Verarbeitung Ihrer personenbezogenen Daten zu beschweren. Zuständig ist für uns der Landesbeauftragte für den Datenschutz und die Informationsfreiheit Baden-Württemberg (<a style={legalA} href="https://www.baden-wuerttemberg.datenschutz.de" target="_blank" rel="noopener noreferrer">www.baden-wuerttemberg.datenschutz.de</a>).
      </p>

      <h2 style={legalH2}>9. Änderungen dieser Erklärung</h2>
      <p style={legalP}>
        Wir behalten uns vor, diese Datenschutzerklärung anzupassen, sofern dies aufgrund geänderter Rechtslage oder bei Änderungen der Website erforderlich wird. Die jeweils aktuelle Fassung ist auf dieser Seite abrufbar.
      </p>

      <div style={{
        marginTop: 72, paddingTop: 24,
        borderTop: '1px solid var(--border)',
        display: 'flex', justifyContent: 'space-between',
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 10, letterSpacing: '0.12em',
        textTransform: 'uppercase', color: 'var(--ink-3)',
      }}>
        <div>Rendium · SIT Operations GmbH</div>
        <a href="#" onClick={(e) => { e.preventDefault(); onGoto('impressum'); }} style={{ color: 'var(--ink-3)', textDecoration: 'none' }}>Impressum →</a>
      </div>
    </LegalLayout>
  );
}

/* ====================================================================
   APP
==================================================================== */
function App() {
  const [tab, setTab] = useState('PORTFOLIO');
  const [selectedProp, setSelectedProp] = useState(PROPERTIES[0]);
  const [unit, setUnit] = useState(null);
  const [rentModal, setRentModal] = useState(false);
  const [contactModal, setContactModal] = useState(false);
  const [ticketModal, setTicketModal] = useState(false);
  const [legalPage, setLegalPage] = useState(null); // 'impressum' | 'datenschutz' | null

  // compute crumbs
  const crumbs = [];
  crumbs.push('DEMO');
  if (tab === 'PORTFOLIO') crumbs.push('PORTFOLIO');
  if (tab === 'OBJEKT')        crumbs.push(selectedProp.code, selectedProp.dist.toUpperCase());
  if (tab === 'WOHNEINHEIT') {
    crumbs.push(selectedProp.code, selectedProp.dist.toUpperCase());
    if (unit) crumbs.push(unit.n);
  }
  if (tab === 'KOMMUNIKATION') crumbs.push(selectedProp.code, 'KOMMUNIKATION');
  if (tab === 'CAPEX')         crumbs.push('MODERNISIERUNGEN');

  return (
    <>
      <TopHeader tab={tab} setTab={setTab} crumbs={crumbs} />

      {tab === 'PORTFOLIO' && (
        <TabPortfolio onOpenProperty={(p) => { setSelectedProp(p); setTab('OBJEKT'); }} />
      )}

      {tab === 'OBJEKT' && (
        <TabObject
          selectedProp={selectedProp}
          setSelectedProp={setSelectedProp}
          onOpenUnit={(u) => { setUnit(u); setTab('WOHNEINHEIT'); }}
          onOpenComms={() => setTab('KOMMUNIKATION')}
        />
      )}

      {tab === 'WOHNEINHEIT' && (
        <TabUnit
          selectedProp={selectedProp}
          setSelectedProp={setSelectedProp}
          unit={unit}
          setUnit={setUnit}
          onOpenRentModal={() => setRentModal(true)}
          onOpenContact={() => setContactModal(true)}
          onOpenTicket={() => setTicketModal(true)}
        />
      )}

      {tab === 'KOMMUNIKATION' && (
        <TabComms selectedProp={selectedProp} setSelectedProp={setSelectedProp} />
      )}

      {tab === 'CAPEX' && (
        <TabCapex selectedProp={selectedProp} setSelectedProp={setSelectedProp} />
      )}

      <div className="footer" style={{ justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', gap: 16 }}>
          <a
            href="#"
            onClick={(e) => { e.preventDefault(); setLegalPage('impressum'); }}
            style={{ color: 'var(--ink-3)', textDecoration: 'none', cursor: 'pointer' }}
            onMouseEnter={(e) => e.target.style.color = 'var(--accent)'}
            onMouseLeave={(e) => e.target.style.color = 'var(--ink-3)'}
          >
            IMPRESSUM
          </a>
          <a
            href="#"
            onClick={(e) => { e.preventDefault(); setLegalPage('datenschutz'); }}
            style={{ color: 'var(--ink-3)', textDecoration: 'none', cursor: 'pointer' }}
            onMouseEnter={(e) => e.target.style.color = 'var(--accent)'}
            onMouseLeave={(e) => e.target.style.color = 'var(--ink-3)'}
          >
            DATENSCHUTZ
          </a>
        </div>
        <div>⌘K Suche · ⌘/ Hilfe · v0.5-demo</div>
      </div>

      {rentModal    && <RentModal    onClose={() => setRentModal(false)} />}
      {contactModal && <ContactModal onClose={() => setContactModal(false)} />}
      {ticketModal  && <TicketModal  onClose={() => setTicketModal(false)} />}

      {legalPage === 'impressum'   && <ImpressumPage   onClose={() => setLegalPage(null)} onGoto={setLegalPage} />}
      {legalPage === 'datenschutz' && <DatenschutzPage onClose={() => setLegalPage(null)} onGoto={setLegalPage} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
